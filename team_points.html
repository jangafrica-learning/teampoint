<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Point Entry</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }

        .form-container {
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin: auto;

            box-shadow:
            0 0 10px rgba(0,0,0,0.1);
        }

        /* LOGO */

        .logo {
            max-width: 70px;
            height: auto;

            display: block;
            margin: 0 auto 10px auto;
        }

        /* TITLE */

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* FIELDS */

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;

            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;

            border: 1px solid #ccc;
            border-radius: 5px;

            box-sizing: border-box;

            font-size: 14px;
            background: white;
        }

        .team-field {
            background: #efefef;
        }

        /* ERROR */

        .error {
            border: 2px solid red !important;
            background: #ffe6e6 !important;
        }

        .error-text {
            color: red;
            font-size: 12px;
            margin-top: 4px;
        }

        /* BUTTONS */

        .buttons {
            margin-top: 25px;

            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;

            padding: 12px;

            border: none;
            border-radius: 5px;

            cursor: pointer;

            font-size: 15px;
            font-weight: bold;

            color: white;
        }

        .save-btn {
            background: #4CAF50;
        }

        .clear-btn {
            background: #f44336;
        }

        /* SUCCESS */

        .success {
            margin-top: 20px;

            text-align: center;
            font-weight: bold;
        }

        /* MOBILE */

        @media screen and (max-width: 768px) {

            .form-container {
                padding: 20px;
            }

            button {
                font-size: 14px;
            }
        }

    </style>
</head>

<body>

    <div class="form-container">

        <!-- LOGO -->
        <img src="logo.png" alt="School Logo" class="logo">

        <h2>Team Point Entry</h2>

        <!-- TIMESTAMP -->

        <div class="field">

            <label>Timestamp</label>

            <input id="timestamp">

            <div class="error-text"
            id="timestamp-error"></div>

        </div>

        <!-- TEAM -->

        <div class="field">

            <label>Team</label>

            <input id="team"
            class="team-field"
            readonly>

            <div class="error-text"
            id="team-error"></div>

        </div>

        <!-- NAME -->

        <div class="field">

            <label>Name(s)</label>

            <select id="names">

                <option value="">
                    Select Name
                </option>

            </select>

            <div class="error-text"
            id="names-error"></div>

        </div>

        <!-- AUTO DEDUCT RULES -->

        <div class="field">

            <label>Auto Deduct Rules</label>

            <select id="autoDeductRules">

                <option value="">
                    Select Auto Deduct Rule
                </option>

            </select>

            <div class="error-text"
            id="autoDeductRules-error"></div>

        </div>

        <!-- REASON -->

        <div class="field">

            <label>Reason(s)</label>

            <input id="reasons">

            <div class="error-text"
            id="reasons-error"></div>

        </div>

        <!-- POINTS -->

        <div class="field">

            <label>Points</label>

            <input type="number"
            id="points">

            <div class="error-text"
            id="points-error"></div>

        </div>

        <!-- SIGNATURE -->

        <div class="field">

            <label>Signature</label>

            <select id="signature">

                <option value="">
                    Select Signature
                </option>

            </select>

            <div class="error-text"
            id="signature-error"></div>

        </div>

        <!-- BUTTONS -->

        <div class="buttons">

            <button class="save-btn"
            onclick="saveData()">

                Save

            </button>

            <button class="clear-btn"
            onclick="clearForm()">

                Clear

            </button>

        </div>

        <!-- SUCCESS -->

        <div class="success"
        id="success-message"></div>

    </div>

    <script>

        // APPS SCRIPT
        const WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbyV583zsZvdfLhlC1e9kMyTZBBHcoP8Rvm_AxoVF4JTYbtbSEvz9Kmy96v1YkJ2eXWg/exec";

        // TEAM DATA
        const teams = {

            "Bright Stars": [

                "Borry",
                "Seikou",
                "Naffisatou",
                "Rohey",
                "Mama",
                "Yusupha",
                "Ebrima",
                "Khalifa",
                "Michael",
                "Choro",
                "Mohammed J",
                "Aisha",
                "Bright Stars"
            ],

            "United Brains": [

                "Lamin D",
                "Lamin C",
                "Yaya",
                "Mohammed A",
                "Jalimaka",
                "Jainaba",
                "Fatou",
                "Hulay",
                "Mariama",
                "Sainabou",
                "Sadio",
                "Sidiki",
                "Sally",
                "Oumie",
                "Neovie",
                "United Brains"
            ]
        };

        // SIGNATURES
        const signatures = [

            "Dr Jobarteh",
            "Ms Saye",
            "Mr Jobe",
            "Ms Beau",
            "Mr Alfuseny",
            "Mr Amfall",
            "Mr LT",
            "Mr Oduyebo",
            "Mr Sylla",
            "Ms Yasai",
            "Mr Hadim"
        ];

        // AUTO DEDUCTION RULES
        const autoDeductRulesData = {

            "BOOKS LEFT IN CLASS": -5,
            "COMING TO CLASS WITHOUT CORRECT BOOKS": -20,
            "NOT TAKING PART IN MORNING CLEANING ROUTINES": -10,
            "NOT WEARING UNIFORM TO ASSEMBLY": -20,
            "COMING LATE TO ASSEMBLY": -10,
            "COMING LATE TO CLASS": -10,
            "SUSPENSION": -100,
            "INCOMPLETE ROUTINES": -30,
            "NO HOME WORK": -20,
            "PHYSICAL ALTERCATION": -30
        };

        // DOM
        const timestamp =
        document.getElementById("timestamp");

        const teamField =
        document.getElementById("team");

        const names =
        document.getElementById("names");

        const autoDeductRules =
        document.getElementById("autoDeductRules");

        const reasons =
        document.getElementById("reasons");

        const points =
        document.getElementById("points");

        const signature =
        document.getElementById("signature");

        // AUTO DATE
        setToday();

        function setToday() {

            timestamp.value =
            new Date().toISOString().split('T')[0];
        }

        // LOAD STUDENTS

        const allStudents = [

            ...teams["Bright Stars"],
            ...teams["United Brains"]

        ].sort((a, b) => a.localeCompare(b));

        allStudents.forEach(name => {

            const option =
            document.createElement("option");

            option.value = name;
            option.textContent = name;

            names.appendChild(option);
        });

        // LOAD SIGNATURES

        signatures.forEach(sig => {

            const option =
            document.createElement("option");

            option.value = sig;
            option.textContent = sig;

            signature.appendChild(option);
        });

        // LOAD AUTO DEDUCTION RULES

        Object.entries(autoDeductRulesData)
        .forEach(([rule, point]) => {

            const option =
            document.createElement("option");

            option.value = rule;

            option.textContent =
            `${rule} (${point} POINTS)`;

            autoDeductRules.appendChild(option);
        });

        // AUTO TEAM

        names.addEventListener("change", function () {

            const selectedName = this.value;

            for (const team in teams) {

                if (
                    teams[team].includes(selectedName)
                ) {

                    teamField.value = team;
                    return;
                }
            }

            teamField.value = "";
        });

        // AUTO FILL REASON AND POINTS

        autoDeductRules.addEventListener(
        "change", function () {

            const selectedRule =
            this.value;

            if (selectedRule === "") {

                reasons.value = "";
                points.value = "";

                return;
            }

            reasons.value = selectedRule;

            points.value =
            autoDeductRulesData[selectedRule];
        });

        // CLEAR FORM

        function clearForm() {

            setToday();

            teamField.value = "";

            names.selectedIndex = 0;

            autoDeductRules.selectedIndex = 0;

            reasons.value = "";

            points.value = "";

            signature.selectedIndex = 0;

            clearErrors();

            document.getElementById(
                "success-message"
            ).textContent = "";
        }

        // CLEAR ERRORS

        function clearErrors() {

            document
            .querySelectorAll(".error")
            .forEach(field => {

                field.classList.remove("error");
            });

            document
            .querySelectorAll(".error-text")
            .forEach(error => {

                error.textContent = "";
            });
        }

        // VALIDATE

        function validateForm() {

            clearErrors();

            let valid = true;

            const fields = [

                "timestamp",
                "team",
                "names",
                "reasons",
                "points",
                "signature"
            ];

            fields.forEach(id => {

                const field =
                document.getElementById(id);

                const error =
                document.getElementById(
                    id + "-error"
                );

                if (
                    field.value.trim() === ""
                ) {

                    field.classList.add("error");

                    error.textContent =
                    "This field is required";

                    valid = false;
                }
            });

            return valid;
        }

        // SAVE

        async function saveData() {

            if (!validateForm()) return;

            document.getElementById(
                "success-message"
            ).textContent = "";

            try {

                fetch(WEB_APP_URL, {

                    method: "POST",

                    body: JSON.stringify({

                        timestamp: timestamp.value,
                        team: teamField.value,
                        names: names.value,
                        reasons: reasons.value,
                        points: points.value,
                        signature: signature.value
                    })
                });

                const success =
                document.getElementById(
                    "success-message"
                );

                success.style.color = "green";

                success.textContent =
                "Saved successfully";

                clearForm();

            } catch (err) {

                console.error(err);

                const success =
                document.getElementById(
                    "success-message"
                );

                success.style.color = "red";

                success.textContent =
                "Failed to save";
            }
        }

    </script>

</body>

</html>
